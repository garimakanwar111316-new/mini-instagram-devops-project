<!DOCTYPE html>
<html>
<head>
    <title>Mini Instagram</title>
</head>
<body>

<h2>Upload Image</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image">
    <button type="submit">Upload</button>
</form>

<h2>Feed</h2>

{% for img in images %}
    <img src="{{ url_for('static', filename='uploads/' + img) }}" width="200">
{% endfor %}

</body>
</html>
